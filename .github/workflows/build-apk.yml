name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose Build Type (debug / release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Inject Environment Variables (.env)
        run: |
          echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.EXPO_PUBLIC_TMDB_API_KEY }}" > .env

      - name: Generate Native Android Directory (Expo Prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK
        working-directory: android
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a
          else
            ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoloGram-${{ github.event.inputs.build_type }}.apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 7
